name: ML CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & Format ──────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install linting tools
        run: pip install black isort flake8 mypy

      - name: Black format check
        run: black --check --diff .

      - name: isort import order
        run: isort --check-only --diff .

      - name: Flake8 lint
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,*.ipynb_checkpoints

  # ── Unit & Integration Tests ───────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -n auto \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Model Training & Validation ────────────────────────────────
  train-validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ML dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow scikit-learn

      - name: Train model
        run: python src/train.py --config configs/ci_config.yaml

      - name: Validate model metrics
        run: python src/validate.py --min-accuracy 0.85 --min-f1 0.80

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.sha }}
          path: models/
          retention-days: 30

  # ── Docker Build & Push ────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: train-validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ml
          push: true
          tags: |
            myorg/ml-model:latest
            myorg/ml-model:${{ github.sha }}
          cache-from: type=registry,ref=myorg/ml-model:buildcache
          cache-to: type=registry,ref=myorg/ml-model:buildcache,mode=max

  # ── Data Drift Check (scheduled) ──────────────────────────────
  data-drift:
    name: Check Data Drift
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install monitoring tools
        run: pip install evidently pandas

      - name: Run drift detection
        run: python src/monitor/drift_check.py --threshold 0.1

      - name: Send alert on drift
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: "ml-alerts"
          slack-message: "Data drift detected in production! Check drift report."
